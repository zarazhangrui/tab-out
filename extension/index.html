<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Out</title>

  <!-- Google Fonts: Newsreader (for headings/numbers) + DM Sans (for body text) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">



  <!-- ================================================================
       HEADER — greeting on the left
       ================================================================ -->
  <header>
    <div class="header-left">
      <!-- "Good afternoon" — written by getGreeting() in app.js -->
      <h1 id="greeting"></h1>
      <!-- "Friday, April 4, 2026" — written by getDateDisplay() in app.js -->
      <div class="date" id="dateDisplay"></div>
    </div>
    <div class="header-right">
      <button class="refresh-btn" id="refreshBtn" title="Refresh">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
      </button>
    </div>
  </header>

  <!-- ================================================================
       QUICK SHORTCUTS — important website icons (left-click to open, right-click to edit)
       ================================================================ -->
  <div class="shortcuts-bar" id="shortcutsBar">
    <div class="section-header">
      <h2>快捷方式</h2>
      <div class="section-line"></div>
    </div>
    <div class="shortcuts-icons" id="shortcutsIcons"></div>
  </div>

  <!-- ================================================================
       TAB MANAGEMENT SECTION — Open tabs
       ================================================================ -->
  <div class="active-section" id="openTabsSection" style="display:none">
    <div class="section-header">
      <h2 id="openTabsSectionTitle">标签页管理</h2>
      <div class="section-line"></div>
      <div class="section-count" id="openTabsSectionCount"></div>
    </div>

    <!-- ================================================================
         SEARCH BAR — filter open tabs by title or URL
         ================================================================ -->
    <div class="search-bar-wrapper" id="searchBarWrapper" style="display:none">
      <div class="search-bar">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
        </svg>
        <input type="text" id="tabSearch" class="tab-search-input" placeholder="">
        <button class="search-clear" id="searchClear" style="display:none" title="Clear search">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>

    <!-- ================================================================
         TAB OUT DUPES BANNER — appears when you have extra Tab Out tabs open
         Hidden by default; app.js shows it when dupeTabOutCount > 1
         ================================================================ -->
    <div class="tab-cleanup-banner" id="tabOutDupeBanner" style="display:none">
      <div class="tab-cleanup-left">
        <div class="tab-cleanup-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 0 1-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 0 1 1.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 0 0-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 0 1-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 0 0-3.375-3.375h-1.5a1.125 1.125 0 0 1-1.125-1.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H9.75" />
          </svg>
        </div>
        <div class="tab-cleanup-text" id="tabOutDupeBannerText">
          You have <strong id="tabOutDupeCount"></strong> Tab Out tabs open. Keep just this one?
        </div>
      </div>
      <button class="tab-cleanup-btn" id="closeExtrasBtn" data-action="close-tabout-dupes">Close extras</button>
    </div>

    <div class="missions" id="openTabsMissions"></div>
  </div>

  <!-- ================================================================
       MAIN CONTENT AREA — two-column layout
       Right: saved for later checklist
       The right column only renders when it has items (JS controls this)
       ================================================================ -->
  <div class="dashboard-columns" id="dashboardColumns">

    <!-- RIGHT COLUMN: Saved for Later checklist -->
    <div class="deferred-column" id="deferredColumn" style="display:none">
      <div class="section-header">
        <h2 id="savedForLaterTitle">Saved for later</h2>
        <div class="section-line"></div>
        <div class="section-count" id="deferredCount"></div>
      </div>

      <!-- Active checklist items — injected by renderDeferredList() in app.js -->
      <div class="deferred-list" id="deferredList"></div>

      <!-- Empty state — shown when no active deferred tabs -->
      <div class="deferred-empty" id="deferredEmpty" style="display:none">
        <span id="nothingSavedText">Nothing saved. Living in the moment.</span>
      </div>

      <!-- Archive section — collapsed by default -->
      <div class="deferred-archive" id="deferredArchive" style="display:none">
        <button class="archive-toggle" id="archiveToggle">
          <svg class="archive-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" /></svg>
          <span id="archiveLabel">Archive</span>
          <span class="archive-count" id="archiveCount"></span>
        </button>
        <div class="archive-body" id="archiveBody" style="display:none">
          <input type="text" class="archive-search" id="archiveSearch" placeholder="">
          <div class="archive-list" id="archiveList"></div>
        </div>
      </div>
    </div>

  </div><!-- end .dashboard-columns -->

  <!-- ================================================================
       FOOTER — global stats + refresh control
       ================================================================ -->
  <footer>
    <div class="footer-stats">
      <div class="stat">
        <div class="stat-num" id="statTabs">—</div>
        <div class="stat-label" id="statTabsLabel">Open tabs</div>
      </div>
    </div>
    <div class="last-refresh">
      <span style="color: var(--muted); font-size: 11px;"><a href="https://github.com/jacky-ch93/tab-out" target="_top" style="color: var(--muted); text-decoration: underline; text-underline-offset: 2px;">Tab Out</a> &middot; designed by <a href="https://github.com/jacky-ch93/tab-out" target="_top" style="color: var(--muted); text-decoration: underline; text-underline-offset: 2px;">jacky-h.c</a> &middot; forked from <a href="https://github.com/zarazhangrui/tab-out" target="_top" style="color: var(--muted); text-decoration: underline; text-underline-offset: 2px;">Zara's original</a></span>
    </div>
  </footer>

</div><!-- end .container -->

<!-- ================================================================
     SHORTCUTS EDIT PANEL — slides in from the right on right-click
     ================================================================ -->
<div class="shortcuts-edit-panel" id="shortcutsEditPanel">
  <div class="shortcuts-edit-header">
    <h3>编辑快捷方式</h3>
    <button class="shortcuts-edit-close" id="shortcutsEditClose">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
      </svg>
    </button>
  </div>
  <div class="shortcuts-edit-content" id="shortcutsEditContent">
    <div class="shortcuts-edit-list" id="shortcutsEditList"></div>
    <div class="shortcuts-edit-add">
      <button class="shortcuts-add-btn" id="shortcutsAddBtn">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
        添加新快捷方式
      </button>
    </div>
  </div>
</div>
<div class="shortcuts-edit-overlay" id="shortcutsEditOverlay"></div>

<!-- ================================================================
     TOAST — floats above everything, used for action confirmations
     Hidden by default via CSS (opacity:0, translateY)
     ================================================================ -->
<div class="toast" id="toast">
  <!-- Checkmark circle icon (Heroicons outline) -->
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
  </svg>
  <span id="toastText"></span>
</div>

<!-- ================================================================
     CHIP HOVER PREVIEW CARD — singleton, positioned by JS
     Hidden by default; shown on chip mouseenter via initChipPreview()
     ================================================================ -->
<div class="chip-preview" id="chipPreview" aria-hidden="true">
  <div class="chip-preview-header">
    <img class="chip-preview-favicon" id="chipPreviewFavicon" src="" alt="">
    <span class="chip-preview-host" id="chipPreviewHost"></span>
  </div>
  <div class="chip-preview-title" id="chipPreviewTitle"></div>
  <div class="chip-preview-meta" id="chipPreviewMeta">
    <span class="chip-preview-time"  id="chipPreviewTime"></span>
    <span class="chip-preview-count" id="chipPreviewCount"></span>
  </div>
</div>

<!-- i18n — must load before app.js and config.local.js -->
<script src="i18n.js"></script>

<!-- Personal config (gitignored) — defines LOCAL_LANDING_PAGE_PATTERNS etc. -->
<!-- If the file doesn't exist, that's fine — app.js uses sensible defaults. -->
<script src="config.local.js"></script>

<!-- Main dashboard logic — loads last so the DOM is ready -->
<script src="app.js"></script>
</body>
</html>
