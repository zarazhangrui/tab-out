<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tab Out</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f8f5f0;
      overflow: hidden;
      width: 100%;
      height: 100vh;
    }

    #dashboard-frame {
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
    }

    #fallback {
      position: fixed;
      inset: 0;
      background: #f8f5f0;
      font-family: Georgia, serif;
      color: #3a2e22;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 24px;
    }

    .hidden {
      display: none !important;
    }

    #fallback:not(.hidden) {
      display: flex;
    }

    #fallback h1 {
      font-size: 1.4rem;
      font-weight: bold;
      color: #c8713a;
    }

    #fallback p {
      font-size: 0.9rem;
      line-height: 1.6;
      max-width: 360px;
      color: #6b5a47;
    }

    #fallback code {
      background: #ede8e1;
      border-radius: 4px;
      padding: 2px 6px;
      font-family: "Courier New", monospace;
      font-size: 0.85em;
      color: #3a2e22;
    }
  </style>
</head>
<body>

  <iframe
    id="dashboard-frame"
    src="http://localhost:3456?mode=sidepanel"
    title="Tab Out Dashboard"
  ></iframe>

  <div id="fallback" class="hidden">
    <h1>Tab Out is not running</h1>
    <p>
      The dashboard server isn't detected at <code>localhost:3456</code>.<br/>
      To start it, open your terminal and run:
    </p>
    <p><code>cd tab-out &amp;&amp; npm start</code></p>
    <p>
      Once the server is running, click the Tab Out icon to open the side panel.
    </p>
  </div>

  <script type="module" src="sidepanel.js"></script>
</body>
</html>
